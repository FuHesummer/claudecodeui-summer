name: Release Publish

on:
  push:
    branches: [main]

jobs:
  release-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          echo "Token length: ${#NPM_TOKEN}"
          echo "Token prefix: ${NPM_TOKEN:0:4}"
          cat ~/.npmrc | sed 's/=.*/=***REDACTED***/'
          npm whoami
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Release
        run: |
          echo "=== NPM auth check ==="
          npm whoami
          echo "=== npm config list ==="
          npm config list
          echo "=== Running release-it ==="
          npx release-it --ci --verbose 2>&1 || {
            echo "=== release-it failed, checking npm auth again ==="
            npm whoami
            echo "=== Checking .npmrc files ==="
            echo "Project .npmrc:"
            cat .npmrc 2>/dev/null | sed 's/_authToken=.*/_authToken=***REDACTED***/' || echo "No project .npmrc"
            echo "Home .npmrc:"
            cat ~/.npmrc 2>/dev/null | sed 's/_authToken=.*/_authToken=***REDACTED***/' || echo "No home .npmrc"
            exit 1
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
